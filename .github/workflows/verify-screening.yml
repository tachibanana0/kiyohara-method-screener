name: Verify Screening (Quick Test)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of stocks to process'
        required: false
        default: '3'
      max_market_cap:
        description: 'Max market cap in 億円'
        required: false
        default: '500'
      max_per:
        description: 'Max real PER'
        required: false
        default: '15'
      skip_owner_check:
        description: 'Skip owner company requirement'
        required: false
        default: 'false'
      min_score:
        description: 'Min management score'
        required: false
        default: '60'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          EDINET_SUBSCRIPTION_KEY: ${{ secrets.EDINET_SUBSCRIPTION_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCREENING_API_URL: ${{ secrets.SCREENING_API_URL }}
          SCREENING_API_TOKEN: ${{ secrets.SCREENING_API_TOKEN }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          MAX_MARKET_CAP: ${{ inputs.max_market_cap }}
          MAX_PER: ${{ inputs.max_per }}
          SKIP_OWNER_CHECK: ${{ inputs.skip_owner_check }}
          MIN_SCORE: ${{ inputs.min_score }}
        run: npx tsx scripts/screening.ts
