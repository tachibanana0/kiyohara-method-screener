name: Verify Screening (Quick Test)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of stocks to process'
        required: false
        default: '3'
      min_quant_score:
        description: 'Minimum quantitative score (0-100)'
        required: false
        default: '20'
      min_score:
        description: 'Min LLM score (Kiyohara Tier 1)'
        required: false
        default: '40'
      watch_score:
        description: 'Watchlist min score'
        required: false
        default: '10'
      require_profit:
        description: 'Require positive profit (true/false)'
        required: false
        default: 'true'
      skip_low_growth:
        description: 'Skip negative growth stocks (true/false)'
        required: false
        default: 'true'
      batch_index:
        description: 'Force batch index (0-4)'
        required: false
        default: ''
      min_net_cash_ratio:
        description: 'Minimum net cash ratio (e.g. 0.05 = 5%)'
        required: false
        default: '1.0'
      require_per_cap_ratio:
        description: 'Require PER < cap/100'
        required: false
        default: 'false'
      all_markets:
        description: 'Include all markets (Prime, Standard, Growth, JASDAQ)'
        required: false
        default: 'false'

concurrency:
  group: jquants-limit
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Install yfinance
        run: pip install yfinance
      - name: Run Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          EDINET_SUBSCRIPTION_KEY: ${{ secrets.EDINET_SUBSCRIPTION_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCREENING_API_URL: ${{ secrets.SCREENING_API_URL }}
          SCREENING_API_TOKEN: ${{ secrets.SCREENING_API_TOKEN }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          MIN_QUANT_SCORE: ${{ inputs.min_quant_score }}
          MIN_SCORE: ${{ inputs.min_score }}
          WATCH_SCORE: ${{ inputs.watch_score }}
          REQUIRE_PROFIT: ${{ inputs.require_profit }}
          SKIP_LOW_GROWTH: ${{ inputs.skip_low_growth }}
          BATCH_INDEX: ${{ inputs.batch_index }}
          ALL_MARKETS: ${{ inputs.all_markets }}
        run: npx tsx scripts/screening.ts
