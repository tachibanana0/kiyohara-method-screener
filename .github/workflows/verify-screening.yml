name: Verify Screening (Quick Test)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of stocks to process'
        required: false
        default: '3'
      max_market_cap:
        description: 'Max market cap (億円)'
        required: false
        default: '270'
      max_per:
        description: 'Max real PER'
        required: false
        default: '25'
      min_score:
        description: 'Min score (Kiyohara-compliant)'
        required: false
        default: '50'
      watch_per:
        description: 'Watchlist max PER'
        required: false
        default: '40'
      watch_score:
        description: 'Watchlist min score'
        required: false
        default: '20'
      require_profit:
        description: 'Require positive profit (true/false)'
        required: false
        default: 'true'
      skip_low_growth:
        description: 'Skip negative growth stocks (true/false)'
        required: false
        default: 'true'
      batch_index:
        description: 'Force batch index (0-4)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          EDINET_SUBSCRIPTION_KEY: ${{ secrets.EDINET_SUBSCRIPTION_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCREENING_API_URL: ${{ secrets.SCREENING_API_URL }}
          SCREENING_API_TOKEN: ${{ secrets.SCREENING_API_TOKEN }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          MAX_MARKET_CAP: ${{ inputs.max_market_cap }}
          MAX_PER: ${{ inputs.max_per }}
          MIN_SCORE: ${{ inputs.min_score }}
          WATCH_PER: ${{ inputs.watch_per }}
          WATCH_SCORE: ${{ inputs.watch_score }}
          REQUIRE_PROFIT: ${{ inputs.require_profit }}
          SKIP_LOW_GROWTH: ${{ inputs.skip_low_growth }}
          BATCH_INDEX: ${{ inputs.batch_index }}
        run: npx tsx scripts/screening.ts
