name: Daily Alpha Tracking

on:
  schedule:
    # 毎日 15:00 JST (UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  tracking:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run Alpha Tracking
        env:
          SCREENING_API_URL: ${{ secrets.SCREENING_API_URL }}
          SCREENING_API_TOKEN: ${{ secrets.SCREENING_API_TOKEN }}
        run: npx tsx scripts/tracking.ts
